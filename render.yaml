services:
  - type: web
    name: medai-backend
    runtime: python
    buildCommand: pip install -r requirements.backend.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: SECRET_KEY
        sync: false