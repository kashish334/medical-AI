name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.backend.txt') }}

      - name: Install backend dependencies
        run: pip install -r requirements.backend.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          GEMINI_API_KEY: "test-key-not-real"
          SECRET_KEY: "test-secret"
          DATABASE_URL: "sqlite://"
        run: |
          pytest tests/ -v --cov=backend --cov-report=term-missing

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t medbot-backend:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t medbot-frontend:ci .
